<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRV-04 // AUDIT</title>
    <style>
        :root { --main: #00ff41; --alert: #ff003c; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--main); font-family: monospace; overflow: hidden; }
        .container { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 10px; }
        .terminal { border: 2px solid var(--main); padding: 20px; width: 100%; max-width: 350px; text-align: left; background: rgba(0,20,0,0.9); }
        h3 { border-bottom: 1px solid var(--main); padding-bottom: 5px; margin-top: 0; text-align: center; }
        .log-line { margin: 8px 0; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="terminal" id="term">
            <h3>[ SYSTEM CHECK ]</h3>
            <div id="output"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.expand(); tg.ready(); }

        const out = document.getElementById('output');
        function addLog(text, isAlert = false) {
            const d = document.createElement('div');
            d.className = 'log-line';
            d.style.color = isAlert ? 'var(--alert)' : 'var(--main)';
            d.innerText = `> ${text}`;
            out.appendChild(d);
        }

        // РАСШИФРОВКА КРИПТО-ПАКЕТА ОТ БОТА
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        let inn = "UNKNOWN", osint = {org: "N/A", ceo: "N/A", status: "N/A"};

        if(q) {
            try {
                // Декодируем URL-safe Base64
                let decodedQ = atob(q.replace(/-/g, '+').replace(/_/g, '/'));
                const p = new URLSearchParams(decodedQ);
                inn = p.get('inn');
                osint = JSON.parse(atob(p.get('p').replace(/-/g, '+').replace(/_/g, '/')));
            } catch(e) {
                addLog("DECRYPTION ERROR: " + e.message, true);
            }
        }

        setTimeout(() => { addLog("INIT DEEP SCAN..."); }, 500);
        setTimeout(() => { addLog(`TARGET INN: ${inn}`); }, 1500);
        setTimeout(() => { addLog(`CEO MATCH: ${osint.ceo}`); }, 2500);
        setTimeout(() => { addLog(`ORG: ${osint.org}`); }, 3500);
        setTimeout(() => { 
            addLog(`STATUS: RED`, true); 
            addLog(`RECOMMENDATION: СВЯЖИТЕСЬ С ИНЖЕНЕРОМ`, true); 
        }, 4500);
    </script>
</body>
</html>
