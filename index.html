<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRV-04 // TERMINAL</title>
    <style>
        :root { --main: #00ff41; --alert: #ff003c; --bg: #000; }
        body, html { margin: 0; padding: 0; background: #000; color: var(--main); font-family: 'Courier New', monospace; overflow: hidden; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.35; }
        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 15px; }
        
        .window { border: 5px solid var(--main); background: rgba(0, 5, 0, 0.98); width: 100%; max-width: 500px; box-shadow: 0 0 50px rgba(0,255,65,0.4); }
        .win-header { background: var(--main); color: #000; padding: 12px; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; letter-spacing: 2px; }
        .win-body { padding: 35px; text-align: left; }
        
        .big-title { font-size: 2.2rem; font-weight: bold; letter-spacing: 6px; margin-bottom: 25px; text-align: center; text-shadow: 0 0 15px var(--main); }
        input { background: #001100; border: 2px solid var(--main); color: var(--main); padding: 20px; width: 100%; margin: 20px 0; font-family: inherit; font-size: 1.4rem; text-align: center; outline: none; }
        button { background: var(--main); color: #000; border: none; padding: 25px; width: 100%; font-weight: bold; font-size: 1.3rem; cursor: pointer; text-transform: uppercase; border: 3px solid #fff; }
        
        .log-row { font-size: 1.3rem; margin: 15px 0; border-left: 8px solid var(--main); padding-left: 20px; background: rgba(0,255,65,0.1); line-height: 1.5; }
        .alert-row { border-color: var(--alert); color: var(--alert); }
        
        .radar { width: 180px; height: 180px; border: 5px solid var(--main); border-radius: 50%; position: relative; margin: 30px auto; overflow: hidden; }
        .sweep { width: 50%; height: 50%; background: linear-gradient(to right, var(--main), transparent); position: absolute; top: 0; left: 50%; transform-origin: bottom left; animation: spin 1.5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .blink { animation: blink 0.6s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="crt">
    <canvas id="matrix-bg"></canvas>
    <div class="container">
        <div class="window" id="ui-input">
            <div class="win-header"><span>SRV_MSK_GATE_04</span><span>[ OFFLINE ]</span></div>
            <div class="win-body">
                <div class="big-title">IDENTIFICATION</div>
                <input type="text" id="inn-field" placeholder="ВВЕДИТЕ ИНН">
                <button onclick="startAudit()">ИНИЦИИРОВАТЬ АУДИТ</button>
            </div>
        </div>

        <div class="window" id="ui-scan" style="display:none;">
            <div class="win-header"><span>AUDIT_CORE_v4.0</span><span>[ ACTIVE ]</span></div>
            <div class="win-body" style="text-align: center;">
                <div class="radar"><div class="sweep"></div></div>
                <div id="status" class="big-title">SCANNING...</div>
            </div>
        </div>

        <div class="window" id="ui-res" style="display:none; border-color: var(--alert);">
            <div class="win-header" style="background: var(--alert); color: #fff;"><span>SECURITY_ALERT</span><span>[ ! ]</span></div>
            <div class="win-body">
                <div class="big-title blink" style="color: var(--alert);">CRITICAL_STATUS</div>
                <div id="log-box"></div>
                <button style="background: var(--alert); color: #fff; margin-top: 30px;" onclick="window.Telegram.WebApp.close()">[ СВЯЗАТЬСЯ С ОПЕРАТОРОМ ]</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // MATRIX EFFECT
        const canvas = document.getElementById('matrix-bg'), ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let drops = Array(Math.floor(w/15)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#0F0'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
                if (y*15 > h && Math.random() > 0.98) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(draw, 33);

        const tg = window.Telegram.WebApp;
        tg.expand();

        // PARSING
        const params = new URLSearchParams(window.location.search);
        const inn = params.get('inn');
        const p = params.get('p');
        let osint = null;

        if(inn && p) {
            try {
                osint = JSON.parse(atob(p));
                document.getElementById('ui-input').style.display = 'none';
                executeAudit(inn);
            } catch(e) { console.error("PARSE_FAIL"); }
        }

        async function startAudit() {
            const field = document.getElementById('inn-field').value;
            if(field.length >= 10) executeAudit(field);
        }

        async function executeAudit(targetInn) {
            document.getElementById('ui-input').style.display = 'none';
            document.getElementById('ui-scan').style.display = 'block';
            
            const steps = ["TUNNELING...", "ACCESSING_DB...", `ENTITY: ${osint ? osint.o : 'SEARCH...'}`, "READY."];
            for(let s of steps) {
                document.getElementById('status').innerText = s;
                await new Promise(r => setTimeout(r, 1500));
            }
            showResult(targetInn);
        }

        function showResult(targetInn) {
            document.getElementById('ui-scan').style.display = 'none';
            document.getElementById('ui-res').style.display = 'block';
            const box = document.getElementById('log-box');
            const data = osint || { o: "ДАННЫЕ СКРЫТЫ", c: "HIDDEN", s: "HIGH_RISK" };
            const lines = [
                `> TARGET_ID: ${targetInn}`,
                `> ORGANIZATION: ${data.o}`,
                `> CEO_CHECK: ${data.c}`,
                `> STATUS: ${data.s}`,
                `> .....................`,
                `> СВЯЖИТЕСЬ С ОПЕРАТОРОМ ДЛЯ`,
                `> РЕШЕНИЯ ВАШЕЙ ПРОБЛЕМЫ`
            ];
            lines.forEach((l, i) => setTimeout(() => {
                const d = document.createElement('div');
                d.className = 'log-row' + (l.includes('STATUS') ? ' alert-row blink' : '');
                d.innerText = l;
                box.appendChild(d);
            }, i * 600));
        }
    </script>
</body>
</html>
