<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRV-MSK-04 | TERMINAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        /* Исправленный фон */
        #bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://files.catbox.moe/urdziz.png');
            background-size: cover; background-position: center;
            opacity: 0.3; /* Прозрачность фона для видимости текста */
            z-index: -2;
        }

        #matrix-canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 0, 0.7); z-index: 0; }

        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        .terminal-box { border: 1px solid #0f0; padding: 30px; background: rgba(0, 0, 0, 0.9); box-shadow: 0 0 20px #0f0; max-width: 400px; width: 90%; }

        h1 { font-size: 1.2rem; margin-bottom: 20px; text-shadow: 0 0 5px #0f0; }
        input { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 12px; font-size: 1.1rem; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 20px; text-align: center; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; width: 100%; }

        #scanner { display: none; }
        .radar { width: 100px; height: 100px; border: 2px solid #0f0; border-radius: 50%; border-top: 2px solid transparent; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #result { display: none; color: #f00; border-color: #f00; box-shadow: 0 0 20px #f00; }
        .log-line { margin: 5px 0; font-size: 0.85rem; text-align: left; }
    </style>
</head>
<body>
    <div id="bg-image"></div>
    <canvas id="matrix-canvas"></canvas>
    <div class="overlay"></div>

    <div class="container">
        <div id="input-screen" class="terminal-box">
            <h1>[ SYSTEM ACCESS ]</h1>
            <input type="number" id="inn-input" placeholder="ВВЕДИТЕ ИНН">
            <button onclick="runAudit()">НАЧАТЬ СКАН</button>
        </div>

        <div id="scanner" class="terminal-box">
            <h1 id="status-title">[ ПРОВЕРКА... ]</h1>
            <div class="radar"></div>
            <div id="progress-text" style="font-size: 0.8rem;">ИНИЦИАЛИЗАЦИЯ ШЛЮЗА...</div>
        </div>

        <div id="result" class="terminal-box">
            <h1 style="color: #f00;">[ КРИТИЧЕСКИЙ СБОЙ ]</h1>
            <div id="log-content"></div>
            <br>
            <button onclick="contactEngineer()" style="background: #f00; color: #fff;">СВЯЗЬ С ИНЖЕНЕРОМ</button>
        </div>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 14; const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // Логика затянутого сканирования
        function runAudit() {
            const inn = document.getElementById('inn-input').value;
            if (inn.length < 10) return alert("ОШИБКА ИНН");

            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('scanner').style.display = 'block';

            const steps = [
                "ПОДКЛЮЧЕНИЕ К СЕРВЕРАМ ФНС...",
                "ОБХОД ФАЙРВОЛА 'КОРДОН'...",
                "ИЗВЛЕЧЕНИЕ ДАННЫХ ПО ОБЪЕКТУ...",
                "СИНХРОНИЗАЦИЯ С РЕЕСТРОМ ЕРВУ...",
                "АНАЛИЗ ТРАНЗАКЦИОННЫХ СВЯЗЕЙ...",
                "ФОРМИРОВАНИЕ ОТЧЕТА ОБ ОШИБКАХ..."
            ];

            let i = 0;
            const interval = setInterval(() => {
                document.getElementById('progress-text').innerText = steps[i];
                i++;
                if (i >= steps.length) {
                    clearInterval(interval);
                    setTimeout(() => showResult(inn), 1000);
                }
            }, 2000); // Каждый шаг длится 2 секунды
        }

        function showResult(inn) {
            document.getElementById('scanner').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            const logContent = document.getElementById('log-content');
            const lines = [
                `> ОБЪЕКТ: ${inn}`,
                `> СТАТУС: ПОД НАБЛЮДЕНИЕМ`,
                `> ВЫЯВЛЕНО: 12 НЕСООТВЕТСТВИЙ`,
                `> РЕКОМЕНДАЦИЯ: СРОЧНАЯ КОРРЕКЦИЯ`
            ];
            lines.forEach(l => {
                const d = document.createElement('div'); d.className = 'log-line';
                d.innerText = l; logContent.appendChild(d);
            });
        }

        function contactEngineer() {
            const tg = window.Telegram.WebApp;
            // ЗАМЕНИТЕ 'USERNAME' НА ВАШ НИК БЕЗ @
            tg.openTelegramLink("https://t.me/USERNAME");
            tg.close();
        }
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
