<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRV-04 // TERMINAL</title>
    <style>
        :root { --main: #00ff41; --alert: #ff003c; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: var(--main); font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.35; }
        .container { position: relative; z-index: 20; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 15px; }
        .terminal { border: 2px solid var(--main); background: rgba(0, 5, 0, 0.95); padding: 30px 20px; width: 100%; max-width: 380px; text-align: center; }
        .radar { width: 100px; height: 100px; border: 2px solid var(--main); border-radius: 50%; position: relative; margin: 20px auto; overflow: hidden; }
        .sweep { width: 50%; height: 50%; background: linear-gradient(to right, var(--main), transparent); position: absolute; top: 0; left: 50%; transform-origin: bottom left; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #log { text-align: left; font-size: 0.8rem; line-height: 1.5; min-height: 150px; }
        .alert { border-color: var(--alert) !important; color: var(--alert) !important; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        button { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="crt">
    <canvas id="matrix-bg"></canvas>
    <div class="container">
        <div id="ui-main" class="terminal">
            <h1 id="head">[ SYSTEM_SCAN ]</h1>
            <div id="ui-radar" class="radar"><div class="sweep"></div></div>
            <div id="status">INITIALIZING...</div>
            <div id="log" style="display:none;"></div>
            <button id="btn" style="display:none;" onclick="window.Telegram.WebApp.close()">[ ВЫХОД ]</button>
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const canvas = document.getElementById('matrix-bg'), ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let letters = '01ABCDEF'.split(''), fontSize = 14, drops = Array(Math.floor(w/fontSize)).fill(1);
        let matrixClr = '#0F0';
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = matrixClr; ctx.font = fontSize+'px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(letters[Math.floor(Math.random()*letters.length)], i*fontSize, y*fontSize);
                if (y*fontSize > h && Math.random() > 0.975) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(draw, 33);

        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        let osint = { org: "HIDDEN", ceo: "HIDDEN", status: "CRITICAL" };
        let inn = "UNKNOWN";

        if(q) {
            try {
                const decoded = atob(q);
                const p = new URLSearchParams(decoded);
                inn = p.get('inn');
                osint = JSON.parse(atob(p.get('p')));
            } catch(e) {}
        }

        setTimeout(async () => {
            const steps = ["CONNECTING...", "QUERYING DB...", `CEO_MATCH: ${osint.ceo}`, "FINALIZING..."];
            for(let s of steps) {
                document.getElementById('status').innerText = s;
                await new Promise(r => setTimeout(r, 1500));
            }
            showResult();
        }, 500);

        function showResult() {
            matrixClr = '#F00';
            document.getElementById('ui-radar').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('head').innerText = '[ RED_STATUS ]';
            document.getElementById('ui-main').classList.add('alert');
            const log = document.getElementById('log'); log.style.display = 'block';
            const lines = [`> TARGET: ${inn}`, `> ORG: ${osint.org}`, `> STATUS: CRITICAL_RED`, `> .....................`, `> СВЯЖИТЕСЬ С ОПЕРАТОРОМ`, `> ЧТОБЫ РЕШИТЬ ПРОБЛЕМУ` ];
            lines.forEach((t, i) => setTimeout(() => { const d = document.createElement('div'); d.innerText = t; log.appendChild(d); }, i*600));
            setTimeout(() => { document.getElementById('btn').style.display = 'block'; }, 4000);
        }
    </script>
</body>
</html>
