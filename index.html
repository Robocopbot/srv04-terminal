<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRV-MSK-04 | TERMINAL</title>
<style>
/* ОСНОВНОЙ СТИЛЬ */
body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }

/* ФОНОВАЯ КАРТИНКА (ЕСЛИ НУЖНА) */
#bg-image {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
/* ЗАМЕНИ ССЫЛКУ НИЖЕ НА СВОЁ ФОТО */
/* background-image: url('https://files.catbox.moe/urdziz.png'); */
background-size: cover; background-position: center;
opacity: 0.15; /* Прозрачность фото, чтобы не мешало коду */
z-index: -2;
}

#matrix-canvas { position: absolute; top: 0; left: 0; z-index: -1; }

.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 20, 0, 0.8); z-index: 0; }

.container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }

.terminal-box { border: 1px solid #0f0; padding: 30px; background: rgba(0, 0, 0, 0.9); box-shadow: 0 0 20px #0f0; max-width: 400px; width: 90%; }

h1 { font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 0 0 5px #0f0; }

input { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 12px; font-size: 1.1rem; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 20px; text-align: center; }

button { background: #0f0; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; }
button:hover { background: #000; color: #0f0; border: 1px solid #0f0; }

/* СКАНЕР/РАДАР */
#scanner { display: none; }
.radar { width: 120px; height: 120px; border: 2px solid #0f0; border-radius: 50%; border-top: 2px solid transparent; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* РЕЗУЛЬТАТ */
#result { display: none; color: #f00; text-shadow: 0 0 5px #f00; text-align: left; font-size: 0.9rem; }
.critical { animation: blink 0.5s infinite; font-weight: bold; font-size: 1.1rem; }
@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

.log-line { margin: 5px 0; border-bottom: 1px solid rgba(255,0,0,0.2); padding-bottom: 2px; }
</style>
</head>
<body>
<div id="bg-image"></div>
<canvas id="matrix-canvas"></canvas>
<div class="overlay"></div>

<div class="container">
<div id="input-screen" class="terminal-box">
<h1>[ SYSTEM AUTH ]</h1>
<p style="font-size: 0.8rem; color: #888;">ВВЕДИТЕ ИНН ОБЪЕКТА ДЛЯ ГЛУБОКОГО АУДИТА РЕЕСТРОВ</p>
<input type="number" id="inn-input" placeholder="ИНН: 10 или 12 ЦИФР">
<button onclick="runAudit()">ИНИЦИИРОВАТЬ СКАН</button>
</div>

<div id="scanner" class="terminal-box">
<h1>[ SCANNING... ]</h1>
<div class="radar"></div>
<div id="progress-text">ПОДКЛЮЧЕНИЕ К УЗЛУ ЕРВУ...</div>
</div>

<div id="result" class="terminal-box" style="border-color: #f00; box-shadow: 0 0 20px #f00;">
<h1 style="color: #f00;">[ ⚠ ATTENTION ]</h1>
<div class="critical">ОБНАРУЖЕНЫ КРИТИЧЕСКИЕ МАРКЕРЫ</div>
<hr style="border: 0.5px solid #f00;">
<div id="log-content"></div>
<br>
<div class="critical" style="text-align: center;">TIME TO SYNC: 04:18:12</div>
<br>
<button onclick="closeApp()" style="background: #f00; color: #fff;">СВЯЗЬ С ИНЖЕНЕРОМ</button>
</div>
</div>

<script>
// --- MATRIX RAIN ---
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;
const chars = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZ@#$%&*";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
	ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
	ctx.fillRect(0, 0, canvas.width, canvas.height);
	ctx.fillStyle = "#0f0";
	ctx.font = fontSize + "px monospace";
	for (let i = 0; i < drops.length; i++) {
		const text = chars[Math.floor(Math.random() * chars.length)];
		ctx.fillText(text, i * fontSize, drops[i] * fontSize);
		if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
		drops[i]++;
	}
}
setInterval(drawMatrix, 40);

// --- ЛОГИКА АУДИТА ---
function runAudit() {
	const inn = document.getElementById('inn-input').value;
	if (inn.length < 10) return alert("ОШИБКА: ИНН ДОЛЖЕН БЫТЬ 10 ИЛИ 12 ЦИФР");
	
	document.getElementById('input-screen').style.display = 'none';
	document.getElementById('scanner').style.display = 'block';
	
	const steps = [
		"ПЕРЕХВАТ ПАКЕТОВ MSK-GATE-04...",
		"ДОСТУП К РЕГИСТРАМ ЕРВУ ПОЛУЧЕН.",
		"АНАЛИЗ ЦИФРОВОГО СЛЕДА...",
		"ПРОВЕРКА БАЗЫ «КОРДОН»..."
	];
	
	let step = 0;
	const interval = setInterval(() => {
		document.getElementById('progress-text').innerText = steps[step];
		step++;
		if (step >= steps.length) {
			clearInterval(interval);
			showResult(inn);
		}
	}, 1200);
}

function showResult(inn) {
	document.getElementById('scanner').style.display = 'none';
	document.getElementById('result').style.display = 'block';
	
	// Генерация "умного" лога
	const region = inn.substring(0, 2);
	const logs = [
		`ОБЪЕКТ: ID-${inn}`,
		`РЕГИОН ПРИВЯЗКИ: ${region}-RUS`,
		`БАЗА «КОРДОН»: 🔴 ЗАПРЕТ_ВЫЕЗДА_PENDING`,
		`БАЗА «ФНС»: 🔴 ОГРАНИЧЕНИЕ_СЧЕТОВ_ACTIVE`,
		`СТАТУС: В ОЧЕРЕДИ НА СИНХРОНИЗАЦИЮ`,
		`МЕТКА: ТЕХНИЧЕСКИЙ ОТКАЗ ПЕРЕМЕЩЕНИЯ`
	];
	
	const logContent = document.getElementById('log-content');
	logs.forEach(line => {
		const div = document.createElement('div');
		div.className = 'log-line';
	div.innerText = "> " + line;
	logContent.appendChild(div);
	});
}

function closeApp() {
	// Закрывает Web App и возвращает в чат с ботом
	if (window.Telegram && window.Telegram.WebApp) {
		window.Telegram.WebApp.close();
	}
}
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
