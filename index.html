<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRV-04 // TERMINAL</title>
    <style>
        :root { --neon-green: #00ff41; --neon-red: #ff003c; --bg-dark: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: var(--neon-green); font-family: 'Courier New', monospace; overflow: hidden; }

        /* Эффект сетки и сканирующей линии */
        .viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 5; pointer-events: none; }
        
        .grid { position: fixed; top: 0; left: 0; width: 200%; height: 200%; 
            background-image: linear-gradient(rgba(0, 255, 65, 0.1) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 65, 0.1) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(-50%);
            animation: moveGrid 20s linear infinite; z-index: -1; }
        @keyframes moveGrid { from { transform: perspective(500px) rotateX(60deg) translateY(-50%); } to { transform: perspective(500px) rotateX(60deg) translateY(0%); } }

        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .terminal-box { border: 2px solid var(--neon-green); background: rgba(0, 0, 0, 0.9); padding: 30px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); width: 100%; max-width: 400px; }

        input { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 15px; width: 100%; box-sizing: border-box; outline: none; margin: 20px 0; font-size: 1.2rem; text-align: center; }
        button { background: var(--neon-green); color: #000; border: none; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        .radar-circle { width: 100px; height: 100px; border: 2px solid var(--neon-green); border-radius: 50%; position: relative; margin: 20px auto; }
        .radar-sweep { width: 50%; height: 50%; background: linear-gradient(45deg, var(--neon-green), transparent); position: absolute; top: 0; left: 50%; transform-origin: bottom left; animation: sweep 1.5s linear infinite; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #log-screen { text-align: left; font-size: 0.8rem; height: 120px; overflow: hidden; margin-top: 15px; line-height: 1.4; }
        .error-theme { border-color: var(--neon-red) !important; color: var(--neon-red) !important; box-shadow: 0 0 30px rgba(255, 0, 60, 0.4) !important; }
        .blink { animation: blinker 0.1s step-end infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="viewport"></div>
    <div class="grid"></div>

    <div class="container">
        <div id="box-auth" class="terminal-box">
            <h1 style="font-size: 1rem;">[ SRV-04 // SECURITY GATE ]</h1>
            <p style="font-size: 0.7rem; opacity: 0.7;">IDENT_TOKEN: REQUIRED</p>
            <input type="number" id="inn-field" placeholder="ВВЕДИТЕ ИНН">
            <button onclick="startAudit()">ИНИЦИИРОВАТЬ АУДИТ</button>
        </div>

        <div id="box-scan" class="terminal-box" style="display: none;">
            <h1>[ SCANNING... ]</h1>
            <div class="radar-circle"><div class="radar-sweep"></div></div>
            <div id="status-text" style="font-size: 0.7rem;">ПЕРЕХВАТ ПАКЕТОВ...</div>
        </div>

        <div id="box-result" class="terminal-box" style="display: none;">
            <h1 style="color: var(--neon-red);">[ ⚠ КРИТИЧЕСКИЙ СБОЙ ]</h1>
            <div id="log-screen"></div>
            <button onclick="closeApp()" style="background: var(--neon-red); color: #fff; margin-top: 15px;">ВЕРНУТЬСЯ В ГЕЙТ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        async function startAudit() {
            const inn = document.getElementById('inn-field').value;
            if (inn.length < 10) return alert("ОШИБКА: ДАННЫЕ НЕПОЛНЫЕ");

            // Вибрация: Начало процесса
            tg.HapticFeedback.impactOccurred('medium');

            document.getElementById('box-auth').style.display = 'none';
            document.getElementById('box-scan').style.display = 'block';

            const steps = [
                "DECRYPTING MSK-GATE-04...",
                "BYPASSING FNS-FIREWALL...",
                "ACCESSING REE_LOCK_DATABASE...",
                "EXTRACTING ENTITY_DATA...",
                "SYNCING WITH KORDON-V.4..."
            ];

            for (let step of steps) {
                document.getElementById('status-text').innerText = step;
                tg.HapticFeedback.selectionChanged(); // Легкая вибрация на каждом шаге
                await new Promise(r => setTimeout(r, 1600));
            }

            showError(inn);
        }

        async function showError(inn) {
            // Вибрация: КРИТИЧЕСКАЯ ОШИБКА (три мощных удара)
            tg.HapticFeedback.notificationOccurred('error');

            document.getElementById('box-scan').style.display = 'none';
            const res = document.getElementById('box-result');
            res.style.display = 'block';
            res.classList.add('error-theme');

            const logScreen = document.getElementById('log-screen');
            const lines = [
                `> ИНН: ${inn}`,
                `> СТАТУС: КРИТИЧЕСКИЙ РИСК`,
                `> БАЗА «КОРДОН»: ЗАПРЕТ ВЫЕЗДА`,
                `> БАЗА «ФНС»: БЛОКИРОВКА СЧЕТОВ`,
                `> SYNC_LOOP: АКТИВИРОВАН`
            ];

            for (let line of lines) {
                const p = document.createElement('div');
                p.style.marginBottom = "5px";
                p.innerText = line;
                logScreen.appendChild(p);
                await new Promise(r => setTimeout(r, 500));
            }
        }

        function closeApp() {
            tg.HapticFeedback.impactOccurred('light');
            tg.close();
        }
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
