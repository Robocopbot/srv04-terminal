<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRV-04 // AUDIT</title>
    <style>
        :root { --main: #00ff41; --alert: #ff003c; --bg: #000; }
        body, html { margin: 0; padding: 0; background: #000; color: var(--main); font-family: 'Courier New', monospace; overflow: hidden; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.35; }
        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        
        /* ГИГАНТСКИЕ ОКНА */
        .window { border: 3px solid var(--main); background: rgba(0, 5, 0, 0.98); width: 100%; max-width: 500px; box-shadow: 0 0 30px rgba(0,255,65,0.4); }
        .header { background: var(--main); color: #000; padding: 8px 15px; font-weight: bold; font-size: 1rem; display: flex; justify-content: space-between; }
        .body { padding: 30px; }
        
        .title { font-size: 1.8rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 10px var(--main); }
        .log-row { font-size: 1.1rem; margin: 10px 0; border-left: 5px solid var(--main); padding-left: 15px; background: rgba(0,255,65,0.05); }
        .critical { color: var(--alert); border-color: var(--alert); text-shadow: 0 0 10px var(--alert); }
        
        /* РАДАР */
        .radar { width: 150px; height: 150px; border: 3px solid var(--main); border-radius: 50%; position: relative; margin: 30px auto; }
        .sweep { width: 50%; height: 50%; background: linear-gradient(to right, var(--main), transparent); position: absolute; top: 0; left: 50%; transform-origin: bottom left; animation: spin 1.5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .btn { background: var(--alert); color: #fff; border: none; padding: 20px; width: 100%; font-weight: bold; font-size: 1.1rem; margin-top: 25px; cursor: pointer; border: 2px solid #fff; }
        .blink { animation: blink 0.6s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="crt">
    <canvas id="matrix-bg"></canvas>
    <div class="container">
        <div class="window" id="scan-win">
            <div class="header"><span>OSINT_AUDIT_SYSTEM_v4.0</span><span>[ ONLINE ]</span></div>
            <div class="body" style="text-align: center;">
                <div class="radar"><div class="sweep"></div></div>
                <div id="status" class="title">INITIALIZING...</div>
            </div>
        </div>

        <div class="window" id="res-win" style="display:none;">
            <div class="header" style="background: var(--alert); color: #fff;"><span>CRITICAL_REPORT</span><span>[ ! ]</span></div>
            <div class="body">
                <div class="title critical blink">RED_STATUS_DETECTED</div>
                <div id="log-box"></div>
                <button class="btn" onclick="window.Telegram.WebApp.close()">[ СВЯЗАТЬСЯ С ОПЕРАТОРОМ ]</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const canvas = document.getElementById('matrix-bg'), ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let drops = Array(Math.floor(w/15)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#0F0'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
                if (y*15 > h && Math.random() > 0.98) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(draw, 33);

        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        let osint = { o: "ДАННЫЕ СКРЫТЫ", c: "HIDDEN", s: "CRITICAL" }, inn = "UNKNOWN";

        if(q) {
            try {
                // Продвинутый декодер с поддержкой padding
                const decodedQ = atob(q);
                const p = new URLSearchParams(decodedQ);
                inn = p.get('inn');
                osint = JSON.parse(atob(p.get('p')));
            } catch(e) { console.error("DECODE_FAIL"); }
        }

        const steps = ["TUNNELING...", "PARSING_RECORDS...", `FOUND: ${osint.o}`, "DONE."];
        let idx = 0;
        const timer = setInterval(() => {
            if(idx < steps.length) {
                document.getElementById('status').innerText = steps[idx++];
            } else {
                clearInterval(timer);
                showResult();
            }
        }, 1500);

        function showResult() {
            document.getElementById('scan-win').style.display = 'none';
            document.getElementById('res-win').style.display = 'block';
            const box = document.getElementById('log-box');
            const lines = [
                `> TARGET_ID: ${inn}`,
                `> ORGANIZATION: ${osint.o}`,
                `> CEO_CHECK: ${osint.c}`,
                `> AUDIT: ${osint.s}`,
                `> ACTION: CONTACT_OPERATOR`
            ];
            lines.forEach((l, i) => {
                setTimeout(() => {
                    const d = document.createElement('div');
                    d.className = 'log-row' + (l.includes('CRITICAL') ? ' critical' : '');
                    d.innerText = l;
                    box.appendChild(d);
                }, i * 600);
            });
        }
    </script>
</body>
</html>
